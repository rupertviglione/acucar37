<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">AÇÚCAR 37</title>
  <desc id="desc">Logótipo da AÇÚCAR 37 com fundo terracota, moldura preta irregular e letras creme.</desc>
  <defs>
    <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="37" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="2.5" fill="#151210" opacity=".35"/>
      <circle cx="58" cy="24" r="1.8" fill="#151210" opacity=".25"/>
      <circle cx="78" cy="69" r="2.2" fill="#f4ead8" opacity=".18"/>
      <circle cx="31" cy="73" r="1.4" fill="#151210" opacity=".25"/>
      <path d="M6 52h20" stroke="#f4ead8" stroke-width="1.3" opacity=".2"/>
      <path d="M52 6l8 38" stroke="#151210" stroke-width="1.2" opacity=".22"/>
    </pattern>
  </defs>
  <rect width="1200" height="1200" fill="#8f3f2d"/>
  <rect width="1200" height="1200" fill="url(#grain)" opacity=".8"/>
  <g filter="url(#roughen)" fill="none" stroke="#11100f" stroke-width="72" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M145 112h910"/>
    <path d="M145 112v930"/>
    <path d="M1055 112v930"/>
    <path d="M145 1042h420"/>
    <path d="M870 1042h185"/>
  </g>
  <g fill="#f3ead8" filter="url(#roughen)" font-family="Impact, 'Arial Black', 'Franklin Gothic Heavy', sans-serif" font-weight="900" text-anchor="middle">
    <text x="600" y="390" font-size="230" letter-spacing="-8">AÇÚCAR</text>
    <text x="360" y="1010" font-size="655" letter-spacing="-36">3</text>
    <text x="810" y="1015" font-size="660" letter-spacing="-40">7</text>
  </g>
  <g fill="#151210" opacity=".55">
    <circle cx="355" cy="285" r="3"/>
    <circle cx="720" cy="410" r="2.4"/>
    <circle cx="896" cy="695" r="2.8"/>
    <circle cx="282" cy="850" r="2.1"/>
    <circle cx="995" cy="210" r="2.6"/>
  </g>
</svg>
